<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NYC Today Status</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
  }

  .container {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .panel {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
  }

  .date {
    font-size: 1.3em;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
  }

  .item {
    margin-bottom: 18px;
  }

  .label {
    font-weight: bold;
    color: #333;
  }

  .value {
    margin-top: 4px;
    font-size: 1.1em;
  }
</style>

</head>
<body>

<div class="container">
  <div class="panel">

    <div class="date" id="todayDate">Loading…</div>

    <div class="item">
      <div class="label">Alternate Side Parking</div>
      <div class="value" id="aspStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">Parking Meters</div>
      <div class="value" id="meterStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">NYC Public Schools</div>
      <div class="value" id="schoolStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">Trash & Recycling</div>
      <div class="value" id="sanitationStatus">Loading…</div>
    </div>

  </div>
</div>

<script>
// Date
const today = new Date();
document.getElementById("todayDate").innerText =
  today.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

// ASP Status (placeholder)
document.getElementById("aspStatus").innerText = "In Effect Today";

// Parking Meters (NYC standard rule)
document.getElementById("meterStatus").innerText = "In Effect";

// School Status (weekends closed)
const day = today.getDay();
document.getElementById("schoolStatus").innerText =
  (day === 0 || day === 6) ? "Closed (Weekend)" : "Open";

// Sanitation (placeholder)
document.getElementById("sanitationStatus").innerText = "Normal Collection";
</script>

</body>
</html>
