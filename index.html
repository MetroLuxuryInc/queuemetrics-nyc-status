<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NYC Today Status</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    background: url('https://upload.wikimedia.org/wikipedia/commons/c/c7/Lower_Manhattan_skyline_-_June_2017.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  .overlay {
    width: 100vw;
    height: 100vh;
    backdrop-filter: blur(3px) brightness(0.85);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .panel {
    background: rgba(255, 255, 255, 0.92);
    padding: 40px;
    border-radius: 18px;
    width: 520px;
    box-shadow: 0 0 18px rgba(0,0,0,0.35);
  }

  .date {
    font-size: 1.8em;
    font-weight: bold;
    text-align: center;
    margin-bottom: 30px;
  }

  .item {
    margin-bottom: 28px;
  }

  .label {
    font-weight: bold;
    color: #333;
    font-size: 1.3em;
  }

  .value {
    margin-top: 6px;
    font-size: 1.4em;
  }
</style>

</head>
<body>

<div class="overlay">
  <div class="panel">

    <div class="date" id="todayDate">Loading…</div>

    <div class="item">
      <div class="label">Alternate Side Parking</div>
      <div class="value" id="aspStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">Parking Meters</div>
      <div class="value" id="meterStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">NYC Public Schools</div>
      <div class="value" id="schoolStatus">Loading…</div>
    </div>

    <div class="item">
      <div class="label">Trash & Recycling</div>
      <div class="value" id="sanitationStatus">Loading…</div>
    </div>

  </div>
</div>

<script>
// Date
const today = new Date();
document.getElementById("todayDate").innerText =
  today.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });

// ASP Status (placeholder)
document.getElementById("aspStatus").innerText = "In Effect Today";

// Parking Meters
document.getElementById("meterStatus").innerText = "In Effect";

// School Status
const day = today.getDay();
document.getElementById("schoolStatus").innerText =
  (day === 0 || day === 6) ? "Closed (Weekend)" : "Open";

// Sanitation
document.getElementById("sanitationStatus").innerText = "Normal Collection";
</script>

</body>
</html>
